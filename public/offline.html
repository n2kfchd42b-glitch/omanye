<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omanye — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1B2A4A;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
    }
    svg { margin-bottom: 24px; opacity: 0.7; }
    h1 { font-size: 22px; margin-bottom: 12px; }
    p  { font-size: 15px; opacity: 0.7; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #C9A84C;
      color: #1B2A4A;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <svg width="64" height="64" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
    </svg>
    <h1>You're offline</h1>
    <p>No internet connection detected. Any field data you collect will be saved on this device and synced automatically when you reconnect.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
